{% extends "base.html" %}
{% block title %}Додати книгу — BookCatalog{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Нова <em>книга</em></h1>
</div>

<div class="form-card">
  <form method="POST" action="/books/add">

    <div class="form-group">
      <label for="title">Назва <span class="required-mark">*</span></label>
      <input type="text" id="title" name="title"
             placeholder="Введіть назву книги"
             value="{{ form.title if form else '' }}" required>
      {% if errors and errors.title %}
        <p class="field-note" style="color:#f87171;">{{ errors.title }}</p>
      {% endif %}
    </div>

    <div class="form-group">
      <label for="author">Автор</label>
      <input type="text" id="author" name="author"
             placeholder="Ім'я автора"
             value="{{ form.author if form else '' }}">
    </div>

    <div class="form-group">
      <label for="year">Рік видання</label>
      <input type="number" id="year" name="year"
             placeholder="напр. 2024" min="1" max="2100"
             value="{{ form.year if form else '' }}">
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Зберегти книгу</button>
      <a class="back-link" href="/books">← Скасувати</a>
    </div>
  </form>
</div>
{% endblock %}
